# 追影 - Docker Compose 配置
# 
# 使用方式：
# 1. 首次部署：docker compose up -d
# 2. 更新镜像：docker compose pull && docker compose up -d

services:
  # 数据库
  postgres:
    image: postgres:15-alpine
    container_name: zhuiying-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zhuiying
      POSTGRES_PASSWORD: zhuiying_secret_2024
      POSTGRES_DB: zhuiying
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhuiying -d zhuiying"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhuiying-network

  # 追影应用
  app:
    image: ghcr.io/sinoquan/zhuiying:latest
    container_name: zhuiying-app
    restart: unless-stopped
    environment:
      # ⭐ 关键配置：数据库连接地址
      DATABASE_URL: "postgresql://zhuiying:zhuiying_secret_2024@postgres:5432/zhuiying"
      
      # 系统登录密码（可修改）
      SYSTEM_PASSWORD: "admin"
      
      # 端口（容器内部，不要改）
      PORT: "5000"
      
      # TMDB API Key（可选，用于识别影视信息）
      # TMDB_API_KEY: "your_tmdb_api_key"
      
      # Telegram Bot（可选）
      # TELEGRAM_BOT_TOKEN: "your_bot_token"
    ports:
      - "35588:5000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - zhuiying-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  zhuiying-network:
    driver: bridge
