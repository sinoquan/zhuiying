# 追影 - Docker Compose 配置（使用预构建镜像）
# 
# 使用方式：
# 1. 首次部署：docker compose up -d
# 2. 更新镜像：docker compose pull && docker compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: zhuiying-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: zhuiying
      POSTGRES_PASSWORD: zhuiying_secret_2024
      POSTGRES_DB: zhuiying
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zhuiying -d zhuiying"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zhuiying-network

  app:
    # 使用 GitHub Container Registry 镜像
    image: ghcr.io/sinoquan/zhuiying:latest
    container_name: zhuiying-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "35588:35588"
    depends_on:
      postgres:
        condition: service_healthy
    # 初始化数据库并启动
    command: sh -c "npx drizzle-kit push --force && node server.js"
    networks:
      - zhuiying-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  zhuiying-network:
    driver: bridge
